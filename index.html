<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>OLM Mission Control</title>
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#04183A">
<meta name="apple-mobile-web-app-title" content="OLM Mission Control">

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
  :root{ --navy:#04183A; --navy-2:#0A2540; --blue:#0A56C4; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: var(--navy); overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  #login {
    position: fixed; inset: 0;
    display: none; align-items: center; justify-content: center;
    padding: 24px; z-index: 5;
  }
  .card {
    background: var(--navy-2);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 18px;
    max-width: 360px; width: 100%;
    padding: 34px 26px; text-align: center;
    box-shadow: 0 12px 44px rgba(0,0,0,.4);
  }
  .logo {
    width: 72px; height: 72px; border-radius: 18px; background: var(--blue);
    margin: 0 auto 18px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 26px; letter-spacing: 1px; color: #fff;
  }
  h1 { color: #fff; font-size: 21px; margin: 0 0 6px; }
  .sub { color: #9FB3D4; font-size: 14px; margin: 0 0 24px; line-height: 1.5; }
  #gbtn { display: flex; justify-content: center; min-height: 44px; }
  .hint { color: #6B7B97; font-size: 12px; margin-top: 18px; line-height: 1.5; }

  #splash {
    position: fixed; inset: 0; background: var(--navy); color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; z-index: 3;
  }
  #splash .logo2 {
    width: 72px; height: 72px; border-radius: 18px; background: var(--blue);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 26px; letter-spacing: 1px;
  }
  #splash .name { font-size: 16px; font-weight: 600; opacity: 0.92; }
  .spin {
    width: 26px; height: 26px;
    border: 3px solid rgba(255,255,255,0.25);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

  <div id="login">
    <div class="card">
      <div class="logo">OLM</div>
      <h1>OLM Mission Control</h1>
      <div class="sub">OZEN Life Maadhoo &middot; Security<br>Sign in to continue.</div>
      <div id="gbtn"></div>
      <div class="hint">Use your authorised Google account. If you can't get in, contact the Security Manager for access.</div>
    </div>
  </div>

  <div id="splash">
    <div class="logo2">OLM</div>
    <div class="name">Opening&hellip;</div>
    <div class="spin"></div>
  </div>

  <script>
    // ===================== CONFIG =====================
    var CLIENT_ID = '349793034127-d8kpprubbnhggsmiucndbeaeemmoa374.apps.googleusercontent.com';
    var EXEC_URL  = 'https://script.google.com/macros/s/AKfycbyV2PjkBJNVNoAAVTP6B2_lVxvTOMBcDYM2Ww5l4NUienOtBXngeDPiTIAE3s7q-Au-/exec';
    var STORE_KEY = 'olm_gmail';
    // ==================================================

    function el(id){ return document.getElementById(id); }
    function parseJwt(token){
      try{
        var b = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
        var json = decodeURIComponent(atob(b).split('').map(function(c){
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(json);
      }catch(e){ return {}; }
    }
    function saveEmail(e){ try{ localStorage.setItem(STORE_KEY, e); }catch(x){} }
    function loadEmail(){ try{ return localStorage.getItem(STORE_KEY) || ''; }catch(x){ return ''; } }

    function goToApp(email){
      saveEmail(email);
      var sep = (EXEC_URL.indexOf('?') > -1) ? '&' : '?';
      el('login').style.display = 'none';
      el('splash').style.display = 'flex';
      window.location.replace(EXEC_URL + sep + 'gmail=' + encodeURIComponent(email));
    }

    function showLogin(){
      el('splash').style.display = 'none';
      el('login').style.display = 'flex';
      renderButton();
    }

    function handleCredential(response){
      var data = parseJwt(response.credential);
      var email = (data && data.email) ? data.email : '';
      if(email){ goToApp(email); }
    }

    function renderButton(){
      if(!(window.google && google.accounts && google.accounts.id)){ setTimeout(renderButton,150); return; }
      google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback: handleCredential
      });
      google.accounts.id.renderButton(
        el('gbtn'),
        { theme:'filled_blue', size:'large', shape:'pill', text:'signin_with', width:260 }
      );
    }

    (function(){
      var saved = loadEmail();
      if(saved){ goToApp(saved); }
      else { showLogin(); }
    })();
  </script>

</body>
</html>
