<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>OLM Mission Control</title>

<meta name="theme-color" content="#04183A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OLM Mission Control">
<link rel="manifest" href="manifest.json">

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
  :root{ --navy:#04183A; --navy-2:#0A2540; --blue:#0A56C4; --gbar: 38px; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: var(--navy); overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  #login {
    position: fixed; inset: 0;
    display: none; align-items: center; justify-content: center;
    padding: 24px; z-index: 5;
  }
  .card {
    background: var(--navy-2);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 18px;
    max-width: 360px; width: 100%;
    padding: 34px 26px; text-align: center;
    box-shadow: 0 12px 44px rgba(0,0,0,.4);
  }
  .logo {
    width: 72px; height: 72px; border-radius: 18px; background: var(--blue);
    margin: 0 auto 18px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 26px; letter-spacing: 1px; color: #fff;
  }
  h1 { color: #fff; font-size: 21px; margin: 0 0 6px; }
  .sub { color: #9FB3D4; font-size: 14px; margin: 0 0 24px; line-height: 1.5; }
  #gbtn { display: flex; justify-content: center; min-height: 44px; }
  .hint { color: #6B7B97; font-size: 12px; margin-top: 18px; line-height: 1.5; }

  #appwrap {
    position: fixed; left: 0; right: 0;
    top: env(safe-area-inset-top, 0px);
    bottom: 0;
    background: var(--navy);
    overflow: hidden;
    display: none; z-index: 1;
  }
  #app {
    position: absolute;
    left: 0; width: 100%;
    top: calc(-1 * var(--gbar));
    height: calc(100% + var(--gbar) + env(safe-area-inset-bottom, 0px));
    border: 0;
  }
  #splash {
    position: fixed; inset: 0; background: var(--navy); color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; z-index: 3;
  }
  #splash .logo2 {
    width: 72px; height: 72px; border-radius: 18px; background: var(--blue);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 26px; letter-spacing: 1px;
  }
  #splash .name { font-size: 16px; font-weight: 600; opacity: 0.92; }
</style>
</head>
<body>

  <!-- SIGN-IN (hidden unless we actually need it) -->
  <div id="login">
    <div class="card">
      <div class="logo">OLM</div>
      <h1>OLM Mission Control</h1>
      <div class="sub">OZEN Life Maadhoo &middot; Security<br>Sign in to continue.</div>
      <div id="gbtn"></div>
      <div class="hint">Use your authorised Google account. If you can't get in, contact the Security Manager for access.</div>
    </div>
  </div>

  <!-- SPLASH (shown on launch while we decide / load) -->
  <div id="splash">
    <div class="logo2">OLM</div>
    <div class="name">Loading&hellip;</div>
  </div>

  <div id="appwrap">
    <iframe id="app"
      allow="clipboard-read; clipboard-write"
      referrerpolicy="no-referrer-when-downgrade"></iframe>
  </div>

  <script>
    // ===================== CONFIG =====================
    var CLIENT_ID = '349793034127-d8kpprubbnhggsmiucndbeaeemmoa374.apps.googleusercontent.com';
    var EXEC_URL  = 'https://script.google.com/macros/s/AKfycbyV2PjkBJNVNoAAVTP6B2_lVxvTOMBcDYM2Ww5l4NUienOtBXngeDPiTIAE3s7q-Au-/exec';
    var STORE_KEY = 'olm_gmail';
    // ==================================================

    function parseJwt(token){
      try{
        var b = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
        var json = decodeURIComponent(atob(b).split('').map(function(c){
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(json);
      }catch(e){ return {}; }
    }

    function saveEmail(email){ try{ localStorage.setItem(STORE_KEY, email); }catch(e){} }
    function loadEmail(){ try{ return localStorage.getItem(STORE_KEY) || ''; }catch(e){ return ''; } }

    function el(id){ return document.getElementById(id); }

    // Load the app for a known email. ALWAYS starts at Home (no &page=), so a
    // cold start never jumps to a leftover page.
    function showApp(email){
      saveEmail(email);
      var sep = (EXEC_URL.indexOf('?') > -1) ? '&' : '?';
      var url = EXEC_URL + sep + 'gmail=' + encodeURIComponent(email);
      el('login').style.display = 'none';
      el('splash').style.display = 'flex';
      var frame = el('app');
      el('appwrap').style.display = 'block';
      frame.src = url;
      frame.addEventListener('load', function(){
        setTimeout(function(){ el('splash').style.display='none'; }, 350);
      });
    }

    // Show the sign-in card (only when we have no remembered account and Google
    // couldn't sign us in silently).
    function showLogin(){
      el('splash').style.display = 'none';
      el('appwrap').style.display = 'none';
      el('login').style.display = 'flex';
    }

    // Google calls this after any sign-in (button OR silent auto).
    function handleCredential(response){
      var data = parseJwt(response.credential);
      var email = (data && data.email) ? data.email : '';
      if(email){ showApp(email); }
      else { showLogin(); }
    }

    function renderButton(){
      if(!(window.google && google.accounts && google.accounts.id)){ setTimeout(renderButton,150); return; }
      google.accounts.id.renderButton(
        el('gbtn'),
        { theme:'filled_blue', size:'large', shape:'pill', text:'signin_with', width:260 }
      );
    }

    function startGoogle(){
      if(!(window.google && google.accounts && google.accounts.id)){ setTimeout(startGoogle,150); return; }
      google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback: handleCredential,
        auto_select: true,           // silently re-sign-in the returning user
        itp_support: true
      });
      // Try a silent return-sign-in. If it can't (first time / revoked), show
      // the button so they can tap once.
      google.accounts.id.prompt(function(notif){
        try{
          if(notif.isNotDisplayed() || notif.isSkippedMoment() || notif.isDismissedMoment()){
            renderButton();
            showLogin();
          }
        }catch(e){ renderButton(); showLogin(); }
      });
    }

    // ── LAUNCH ──
    (function(){
      var saved = loadEmail();
      if(saved){
        // We remember this officer -> go straight in, no login screen.
        showApp(saved);
        // Quietly refresh Google auth in the background (keeps it valid) but
        // don't block the app on it.
        startGoogle();
      } else {
        // No memory yet -> try silent Google, else show the button.
        startGoogle();
        renderButton();
      }
    })();
  </script>

</body>
</html>
